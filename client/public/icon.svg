<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="100%" stop-color="#121212" />
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec78dc" />
      <stop offset="100%" stop-color="#e085e9" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded Background -->
  <rect x="32" y="32" width="448" height="448" rx="120" ry="120" fill="url(#bg)" stroke="rgba(255,255,255,0.1)" stroke-width="8" />
  
  <!-- Glass Shine -->
  <path d="M152 32 C 86 32 32 86 32 152 L 32 256 C 32 130 130 32 256 32 L 152 32 Z" fill="rgba(255,255,255,0.05)" />

  <!-- Musical Note -->
  <g transform="translate(128, 128) scale(0.5)" filter="url(#glow)">
      <path fill="url(#note)" d="M384 32h-64c-17.67 0-32 14.33-32 32v216.45c-15.68-7.92-33.56-12.45-52.5-12.45C179.5 268 128 319.5 128 382s51.5 114 107.5 114 107.5-51.5 107.5-114V138h51c17.67 0 32-14.33 32-32s-14.33-74-42-74z"/>
