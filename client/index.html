<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <title>DrivePlayer</title>
  <style>
    body { margin: 0; background: #000; }
    #initial-loader {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; z-index: 9999;
      gap: 20px;
      transition: opacity 0.4s ease;
    }
    #initial-loader.hidden { opacity: 0; pointer-events: none; }
    .loader-logo {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #7c6fcd, #5a4fa0);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(124,111,205,0.4);
      animation: pulse 2s ease-in-out infinite;
    }
    .loader-logo svg { width: 28px; height: 28px; fill: white; }
    .loader-spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: #7c6fcd;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loader-text {
      color: rgba(255,255,255,0.4);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px; letter-spacing: 0.5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(124,111,205,0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(124,111,205,0.6); }
    }
  </style>
</head>

<body>
  <div id="initial-loader">
    <div class="loader-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
      </svg>
    </div>
    <div class="loader-spinner"></div>
    <div class="loader-text">DrivePlayer</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
